# Sample workflow for building and deploying a Next.js site to GitHub Pages
#
# To get started with Next.js see: https://nextjs.org/docs/getting-started
#
name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        # NOTE: intentionally NOT passing `static_site_generator: next`. That option
        # only detects next.config.{js,cjs,mjs} — it can't see our next.config.ts, so
        # it writes a fresh, plugin-less next.config.js that shadows ours and drops the
        # next-intl plugin (build then fails at prerender: "Couldn't find next-intl
        # config file"). We set basePath / images.unoptimized ourselves in next.config.ts
        # and feed the resolved sub-path to the build via NEXT_PUBLIC_BASE_PATH below.
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
      - name: Build with Next.js
        run: ${{ steps.detect-package-manager.outputs.runner }} next build
        env:
          # Repo sub-path the Pages site is served under. Read by next.config.ts
          # (basePath) and the root locale-redirect stub. Hardcoded to the repo
          # name because it's fixed and there's no custom domain — guarantees a
          # correct value rather than depending on the configure-pages output.
          # If a custom domain (CNAME) is added, set this to "" (or switch to
          # `${{ steps.pages.outputs.base_path }}`).
          NEXT_PUBLIC_BASE_PATH: /
          # Web3Forms access key for the contact form. Inlined into the client
          # bundle at build time (NEXT_PUBLIC_), so it's public by design —
          # hardcoded here because `.env` is git-ignored and never reaches CI.
          # Prefer a repo variable? Swap for `${{ vars.NEXT_PUBLIC_WEB3FORMS_KEY }}`.
          NEXT_PUBLIC_WEB3FORMS_KEY: cab73c2c-444b-432f-a85f-a60f2dd28725
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
